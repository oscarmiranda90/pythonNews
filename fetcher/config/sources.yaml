# ─────────────────────────────────────────────────────────────────────────────
# GitHub Trending — fetched via web scraping (no API key required)
# ─────────────────────────────────────────────────────────────────────────────
github:
  enabled: true
  count: 5                 # repos to include per run
  since: "daily"           # daily | weekly | monthly
  languages:               # scrape these language-filtered pages and merge
    - ""                   # "" = all languages (top trending overall)
    - "python"
    - "javascript"

# ─────────────────────────────────────────────────────────────────────────────
# Hacker News — via Algolia HN Search API (no API key required)
# ─────────────────────────────────────────────────────────────────────────────
hackernews:
  enabled: true
  count: 4                 # stories to include per run
  queries:                 # searched in parallel, results merged + deduped
    - "AI"
    - "LLM"
    - "machine learning"
    - "SaaS"
    - "open source"
  min_points: 50           # ignore stories with fewer points
  hours_back: 24           # only stories from the last N hours
